  - type: MultipleChoice
    question:
      text: |
        Cet algorithme est censé trier la liste `t` en ordre croissant, mais le résultat est incorrect (il perd des valeurs). 
        Quelle modification permet de le réparer de façon à ce qu'il trie correctement la liste ?

            def s(t):
                n = len(t)
                for i in range(n):
                    for j in range(n - 1):
                        if t[j] > t[j+1]:
                            t[j] = t[j+1]
                            t[j+1] = t[j]
      choices:
        - "Remplacer les deux lignes dans le 'if' par l'échange : x = t[j]; t[j] = t[j+1]; t[j+1] = x"
        - 'Remplacer la condition par : if t[j] < t[j+1]:'
        - 'Remplacer la boucle interne par : for j in range(n):'
        - "Ajouter 'return t' juste en dessous de 't[j+1] = t[j]', avec la même indentation"
      answer: "Remplacer les deux lignes dans le 'if' par l'échange : x = t[j]; t[j] = t[j+1]; t[j+1] = x"

  - type: Python
    question:
      text: |
        Écrire une fonction nommée `unique()` qui reçoit une liste en paramètre et qui renvoie une nouvelle liste contenant
        une fois chaque élément de la liste d’entrée, dans l’ordre d’apparition de la 1ère occurrence.
      answer: |
        def unique(lst):
            seen = set()
            res = []
            for x in lst:
                if x not in seen:
                    seen.add(x)
                    res.append(x)
            return res

      tests:
        - test: unique([1,2,1,3,2])
          desc: -> [1,2,3]
        - test: unique(["a","b","a"])
          desc: -> ['a','b']

  - type: Python
    question:
      text: |
        Écrire une fonction nommée `zipper()` qui reçoit 2 listes en paramètres et qui renvoie une liste contenant les
        éléments des deux listes alternés. Attention, les deux listes peuvent être de tailles différentes.
      answer: |
        def zipper(a, b):
            res = []
            n = max(len(a), len(b))
            for i in range(n):
                if i < len(a):
                    res.append(a[i])
                if i < len(b):
                    res.append(b[i])
            return res
      tests:
        - test: zipper([1,2,3],["a","b"])
          desc: -> [1,'a',2,'b',3]
        - test: zipper([],[1,2])
          desc: -> [1,2]

  - type: Python
    question:
      text: |
        Écrire une fonction nommée `fibo()` qui prend un entier `n` en paramètre et qui renvoie le `n`ième terme de la suite de Fibonacci.
        Les deux premiers termes sont égaux à 1. Les termes sont numérotés à partir de 1.
      answer: |
        def fibo(n):
            if n <= 2:
                return 1
            a, b = 1, 1
            for _ in range(3, n+1):
                a, b = b, a + b
            return b
      tests:
        - test: fibo(1)
          desc: -> 1
        - test: fibo(2)
          desc: -> 1
        - test: fibo(6)
          desc: -> 8

  - type: Python
    question:
      text: |
        Écrire une fonction nommée `pgcd()` qui prend deux entiers en paramètres et renvoie le Plus Grand Commun Diviseur (PGCD).
      answer: |
        def pgcd(a, b):
            while b:
                a, b = b, a % b
            return abs(a)
      tests:
        - test: pgcd(48, 18)
          desc: -> 6
        - test: pgcd(7, 3)
          desc: -> 1
