  - type: MultipleChoice
    question:
      text: |
        Que fait ce bloc de code sur une liste `t` ?

            x = t[i]
            t[i] = t[j]
            t[j] = x
      choices:
        - Il supprime les éléments aux index i et j
        - Il remplace l'élément i par l'élément j, et perd la valeur originale de i
        - Il échange (swap) les valeurs situées aux index i et j
        - Il additionne les valeurs aux index i et j
      answer: Il échange (swap) les valeurs situées aux index i et j

