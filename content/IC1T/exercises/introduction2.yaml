    question:
      code: |
        nombre_changeant = 5
        while nombre_changeant > 0:
          nombre_changeant = nombre_changeant - 10
        print(nombre_changeant)
  - type: Output
    question:
      code: |
        accumulateur = 0
        nombre_changeant = 5
        while nombre_changeant > 0:
          accumulateur = accumulateur + nombre_changeant
          nombre_changeant = nombre_changeant - 1
        print(accumulateur)
  - type: Output
    question:
      code: |
        accumulateur = 0
        nombre_changeant = 5
        while nombre_changeant > 0:
          accumulateur = accumulateur + nombre_changeant
          if nombre_changeant != 3 and nombre_changeant != 1:
            nombre_changeant = nombre_changeant - 1
          else:
            nombre_changeant = nombre_changeant - 2
        print(accumulateur)
