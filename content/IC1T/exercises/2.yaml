body:
  - type: Python
    question:
      wrap: false
      text: |
        Écrire une fonction nommée `radians()` qui reçoit un angle en degré et renvoie sa valeur en radians.
      answer: |
        from math import pi

        def radians(deg):
            return pi*deg/180
      tests:
        - test: round(radians(90), 6)
          desc: Entrer 90 devrait donner pi/2
        - test: round(radians(180), 6)
          desc: Entrer 180 devrait donner pi
        - test: round(radians(270), 6)
          desc: Entrer 270 devrait donner 3pi/2

  - type: Python
    question:
      wrap: false
      text: |
        Écrire une fonction nommée `orthodromic(R, lat1, long1, lat2, long2)` qui 
        calcule la distance orthodromique entre deux points sur une sphère.

        La distance orthodromique est la plus courte distance entre deux points
        situés à la surface d’une sphère, mesurée le long de la surface. Elle
        correspond à la longueur de l'arc du grand cercle reliant ces deux points.

        Elle se calcule par la formule suivante:

        $$ D = R \: \arccos(\sin(\phi_1) \sin(\phi_2) + \cos(\phi_1) \cos(\phi_2) \cos(\lambda_1 - \lambda_2)) $$

        où les $\phi$ représentent des latitudes et les $\lambda$ représentent des
        longitudes

        _Remarques: Les fonction `sin()` et `cos()` de Python attendent des angles en
        radians. Alors que les coordonnées GPS sont traditionnellement exprimées en
        degrés._
      answer: |
        from math import sin, cos, acos, pi

        def radians(deg):
            return deg * pi / 180

        def orthodromic(R, lat1, long1, lat2, long2):
            lat1 = radians(lat1)
            lat2 = radians(lat2)
            long1 = radians(long1)
            long2 = radians(long2)
            d = R * acos(sin(lat1) * sin(lat2) + cos(lat1) * cos(lat2) * cos(long2 - long1))
            return d
      tests:
        - test: round(orthodromic(6371.0, 50.850450, 4.348780, -33.854816, 151.216454), 3)
          desc: Bruxelles -> Sydney = 16744.231 km
        - test: round(orthodromic(6371.0, 50.850450, 4.348780, 35.6768601, 139.7638947), 3)
          desc: Bruxelles -> Tokyo = 9452.430 km

  - type: Python
    question:
      wrap: false
      text: |
        Écrire une fonction nommée `float_list` qui reçoit une liste et qui renvoie la liste de ses
        valeurs converties en flottants. On suppose que toutes les valeurs de la
        liste d’entrée sont convertibles en flottants.
      answer: |
        def float_list(L):
          res = []
          for elem in L:
              res.append(float(elem))
          return res
      tests:
        - test: float_list(['1', '-0.2', '42.42'])
          desc: "['1', '-0.2', '42.42'] -> [1.0, -0.2, 42.42]"
        - test: float_list([])
          desc: "[] -> []"
        - test: float_list([1, 2, 3, 4])
          desc: "[1, 2, 3, 4] -> [1.0, 2.0, 3.0, 4.0]"

  - type: Python
    question:
      wrap: false
      text: |
        Écrire une fonction nommée `input_list()` qui permettra de demander à
        l'utilisateur d’entrer une liste de `str`. La fonction prendra en paramètre
        le message à afficher à l'utilisateur _(comme le fait la fonction
        `input()`)_. Elle demandera ensuite d’entrer chaque valeur individuellement
        jusqu'à ce que l'utilisateur valide une chaîne vide _(de longueur `0`)_. La
        fonction renverra la liste produite.

        **Exemple d'utilisation:**


        ### exo1.py

        ```
        L = input_list("Entrez vos animaux préférés")
        print(L)
        ```

        ### Terminal

        ```
        > python exo1.py
        Entrez vos animaux préférés:
        élément 1: Tigre
        élément 2: Gorille
        élément 3: Velociraptor
        élément 4:
        ['Tigre', 'Gorille', 'Velociraptor']
        ```

        _Remarque: la correction automatique est impossible pour cet exercice. **Utiliser le bouton ▶ pour tester votre réponse**_
      answer: |
        def input_list(msg):
          print(msg)
          i = 1
          elem = input("élément 1: ")
          res = []
          while len(elem) > 0:
              res.append(elem)
              i += 1
              elem = input("élément " + str(i) + ": ")
          return res
      tests:
        - test: '"La fonction existe" if callable(input_list) else "La fonction n''existe pas"'
          desc: La fonction `input_list()` doit exister. Elle ne sera pas testée par cette correction !

  - type: Python
    question:
      wrap: false
      text: |
        Écrire une fonction nommée `unzip` qui reçois une liste en paramètre et qui la divisera en
        deux listes. La première contiendra tous les éléments d'indices pairs et la
        seconde ceux d'indices impairs. Les deux listes seront renvoyées sous forme
        d'une liste de 2 listes.
      answer: |
        def unzip(L):
          res = [[], []]

          for i in range(len(L)):
              res[i % 2].append(L[i])

          return res
      tests:
        - test: unzip([1, 2, 3, 4, 5, 6])
          desc: "[1, 2, 3, 4, 5, 6] -> [[1, 3, 5], [2, 4, 6]]"
        - test: unzip(["lat1", "long1", "lat2", "long2", "lat3", "long3", "lat4", "long4"])
          desc: '[["lat1", "lat2", "lat3", "lat4"], ["long1", "long2", "long3", "long4"]]'

  - type: Python
    question:
      wrap: true
      text: |
        Écrire un programme qui demande d'entrer les coordonnées GPS de plusieurs
        lieux les unes après les autres _(jusqu'à ce qu'on valide une chaîne vide)_
        et qui affiche la longueur du chemin ainsi formé. Les fonctions des exercices
        précédents peuvent vous aider.

        __Remarque: le rayon de la terre utilisé est de 6371 km__
      answer: |
        from math import sin, cos, acos, pi

        def radians(deg):
            return deg * pi / 180

        def orthodromic(R, lat1, long1, lat2, long2):
            lat1 = radians(lat1)
            lat2 = radians(lat2)
            long1 = radians(long1)
            long2 = radians(long2)
            d = R * acos(sin(lat1) * sin(lat2) + cos(lat1) * cos(lat2) * cos(long2 - long1))
            return d

        def float_list(L):
            res = []
            for elem in L:
                res.append(float(elem))
            return res

        def input_list(msg):
            print(msg)
            i = 1
            elem = input("élément 1: ")
            res = []
            while len(elem) > 0:
                res.append(elem)
                i += 1
                elem = input("élément " + str(i) + ": ")
            return res

        def unzip(L):
            res = [[], []]

            for i in range(len(L)):
                res[i % 2].append(L[i])

            return res

        def main():
            coords = unzip(float_list(input_list("Entrez les coordonnées:")))
            radius = 6371
            res = 0
            for i in range(len(coords[0]) - 1):
                res += orthodromic(
                    radius, coords[0][i], coords[1][i], coords[0][i + 1], coords[1][i + 1]
                )
            return res

        print(main())
      tests:
        - test: f"{float(res.group()):.3f}" if (res := __import__("re").compile(r"[+-]?(?:\d+\.\d*|\.\d+|\d+)").search(main(["50.850450", "4.348780", "-33.854816", "151.216454", ""]))) is not None else None
          desc: Bruxelles -> Sydney = 16744.231
        - test: f"{float(res.group()):.3f}" if (res := __import__("re").compile(r"[+-]?(?:\d+\.\d*|\.\d+|\d+)").search(main(["-33.854816", "151.216454", "50.850450", "4.348780", "35.6768601", "139.7638947", ""]))) is not None else None
          desc: Sydney -> Bruxelles -> Tokyo = 26196.660
